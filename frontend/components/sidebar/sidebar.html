<html>

    </head>
    <body>
        <aside class="sidebar" id="sidebarNav">
            <div class="sidebar-inner">
                <div class="toggle">
                    <div class="logo-area">
                        <h2><i class="fas fa-boxes"></i>POS</h2>
                        <p>Admin Panel V1.0</p>    
                    </div>
                    <button class="sidebar-toggle">
                        <span class="material-symbols-rounded">
                                    keyboard_arrow_left
                        </span>
                    </button>
                         
                </div>
                <div class="navbar-links">
                    <a href="../../pages/dashboard/dashboard.html"><div class="nav-item "><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></div></a>
                    <a href="../../pages/billing/pay.html"><div class="nav-item"><i class="fas fa-cash-register"></i><span>Cashier</span></div></a>
                    <a href="../../pages/products/product.html"><div class="nav-item active"><i class="fas fa-tags"></i><span>Products</span></div></a>
                    <a href="../../pages/inventory/inventory.html"><div class="nav-item"><i class="fas fa-warehouse"></i><span>Inventory</span></div></a>
                    <div class="nav-item"><i class="fas fa-sliders-h"></i><span>Setting</span></div>
                    <div class="nav-logout">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M5 22C4.44772 22 4 21.5523 4 21V3C4 2.44772 4.44772 2 5 2H19C19.5523 2 20 2.44772 20 3V6H18V4H6V20H18V18H20V21C20 21.5523 19.5523 22 19 22H5ZM18 16V13H11V11H18V8L23 12L18 16Z"></path></svg>
                    <span>Log Out</span>
                    </div>
                </div>
                    
            </div>
</aside>
<script>
    
// Sidebar navigation highlight, plus demo message (non-destructive)
const navItems = document.querySelectorAll('.nav-item');
navItems.forEach(item => {
    item.addEventListener('click', function() {
      navItems.forEach(nav => nav.classList.remove('active'));
      this.classList.add('active');
      if(this.innerText.includes('Products')) alert('You are already on Product Management view.');
      else alert(`Demo: ${this.innerText} section (Product Management remains active).`);
    });
  });
</script>
</body>
</html>
