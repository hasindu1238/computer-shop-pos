<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing</title>
    <link rel="stylesheet" href="pay.css">
    <link rel="stylesheet" href="../../components/sidebar/sidebar.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div id="navbar-container"></div>
    
    <!-- Main content wrapper -->
    <div class="main-wrapper">
        <!--item section-->
        <main class="item-section" id="itemSection">
            <div class="search-tab">
                <input type="text" placeholder="Search items here..." class="search-input" id="searchInput">
                <div class="search-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18.031 16.6168L22.3137 20.8995L20.8995 22.3137L16.6168 18.031C15.0769 19.263 13.124 20 11 20C6.032 20 2 15.968 2 11C2 6.032 6.032 2 11 2C15.968 2 20 6.032 20 11C20 13.124 19.263 15.0769 18.031 16.6168ZM16.0247 15.8748C17.2475 14.6146 18 12.8956 18 11C18 7.1325 14.8675 4 11 4C7.1325 4 4 7.1325 4 11C4 14.8675 7.1325 18 11 18C12.8956 18 14.6146 17.2475 15.8748 16.0247L16.0247 15.8748Z"></path>
                    </svg>
                </div>
            </div>
            
            <!-- Product grid -->
            <div class="product-grid" id="productGrid">
                <!-- Products will be rendered here -->
            </div>
            
            <!-- Categories -->
            <div class="category-item" id="categoryContainer">
                <div class="category-name active-category" data-category="All">All</div>
                <div class="category-name" data-category="Beverages">Beverages</div>
                <div class="category-name" data-category="Snacks">Snacks</div>
                <div class="category-name" data-category="Dairy">Dairy</div>
                <div class="category-name" data-category="Fruits">Fruits</div>
                <div class="category-name" data-category="Vegetables">Vegetables</div>
                <div class="category-name" data-category="Bakery">Bakery</div>
            </div>
            
            <div class="bottom-action">
                <button class="bottom-btn cancel" onclick="cancelBill()">Cancel Bill</button>
                <button class="bottom-btn" onclick="holdBill()">Hold Bill</button>
            </div>
        </main>

        <!-- Billing section -->
        <div class="checkout-side" id="checkoutSide">
            <h1>Checkout</h1>
            <div class="bill-table-wrapper">
                <table class="bill-table" id="bill-table">
                    <thead>
                        <tr>
                            <th style="width: 30px;"></th>
                            <th>Name</th>
                            <th style="width: 80px;">Qty</th>
                            <th style="width: 60px;">Disc</th>
                            <th>Price</th>
                        </tr>
                    </thead>
                    <tbody id="billTableBody">
                        <tr class="empty-cart-row">
                            <td colspan="5">No item added</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Summary -->
            <div class="summary-stats" id="summary-stats">
                <div class="summary-item">
                    <span class="stat-label">Discount (%)</span>
                    <input type="number" id="discountPercentInput" value="0" step="1" min="0" max="100">
                </div>
                <div class="summary-item">
                    <span class="stat-label">Total Save</span>
                    <span class="stat-value" id="totalSave">Rs.0.00</span>
                </div>
                <div class="summary-item">
                    <span class="stat-label">Sub Total</span>
                    <span class="stat-value" id="subTotal">Rs.0.00</span>
                </div>
            </div>
            
            <!-- Total -->
            <div class="summary-price">
                <div class="total">
                    <span class="stat-name">Total</span>
                    <span class="stat-total" id="stat-total">Rs.0.00</span>
                </div>
            </div>

            <button class="pay-btn" onclick="processPayment()">Pay</button>
        </div>
    </div>

    <script src="pay.js"></script>
</body>
</html>
