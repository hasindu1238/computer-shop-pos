<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width", initial-scale="1.0">
        <title>Billing</title>
        <link rel="stylesheet" href="../../assets/css/bill.css"
    </head>
    <body>

        <!--item section-->
        <div class="item-section">
            <div class="search-tab">
                <input type="text" placeholder="Select items here..." class="search-input">
                <div class="search-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M18.031 16.6168L22.3137 20.8995L20.8995 22.3137L16.6168 18.031C15.0769 19.263 13.124 20 11 20C6.032 20 2 15.968 2 11C2 6.032 6.032 2 11 2C15.968 2 20 6.032 20 11C20 13.124 19.263 15.0769 18.031 16.6168ZM16.0247 15.8748C17.2475 14.6146 18 12.8956 18 11C18 7.1325 14.8675 4 11 4C7.1325 4 4 7.1325 4 11C4 14.8675 7.1325 18 11 18C12.8956 18 14.6146 17.2475 15.8748 16.0247L16.0247 15.8748Z"></path></svg></div>
            </div>
            <div class="product-card">
                <div class="product-image"></div>
                <p class="product-name">Mango Juice</p>
                <p class="product-value">Rs.500.00</p>
            </div>
            <!--Categories-->
            <div class="category-item">
                <div class="category-name">Category</div>
                <div class="category-name">Category</div>
                <div class="category-name">Category</div>
                <div class="category-name">Category</div>
                <div class="category-name">Category</div>
                <div class="category-name">Category</div>
                <div class="category-name">Category</div>
            
            </div>
            <div class="bottom-action">
                <button class="bottom-btn cancel">Cancel Bill</button>
                <button class="bottom-btn">Hold Bill</button>
                
            </div>
        </div>

        
        
        <!--Billing section-->
        <div class="checkout-side">
            <h1>Checkout</h1>
            <div class="bill-table-wrapper">
                <table class="bill-table" id="bill-table">
                    <thead>
                        <tr><th></th><th>Name</th><th>Qty</th><th>Discount</th><th>Price</th></tr>
                    </thead>
                    <tbody id="billTableBody">
                        <tr class="empty-cart-row"><td colspan="5">No item added</td></tr>
                    </tbody>
                </table>
            </div>

            <!--Summary-->
            <div class="summary-stats" id="summary-stats" >
                <div class="summary-item"><span class="stat-label">Discount(%)</span><span class="stat-value" id="discount">10</span></div>
                <div class="summary-item"><span class="stat-label">Total Save</span><span class="stat-value" id="totalSave">Rs.150.00</span></div>
                <div class="summary-item"><span class="stat-label">Sub Total</span><span class="stat-value" id="subTotal">Rs.1650.00</span></div>
            </div>
            <!--Total-->
            <div class="summary-price">
                <div class="total"><span class="stat-name">Total</span><span class="stat-total" id="stat-total">Rs.1500.00</span></div>
            </div>

            <button class="pay-btn">Pay</button>
        </div>

        <script src="../../assets/js/bill.js"></script>
    </body>
</html>
