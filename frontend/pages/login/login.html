<!DOCTYPE html>
<html lang="en">
    
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width", initial-scale="1.0">

        <link rel="stylesheet" href="../../assets/css/style.css">

        <title>Login</title>
    </head>
    <body>
        <div class="main">
            <div class="right">
                <div class="form-header">
                    <h1>Signin</h1>
                </div>
                <form class="form-box"  method="POST">
                    <div class="input-group">
                        <input type="text" id="username" class="input-field" placeholder="" required>
                        <label for="username" class="floating-label">Enter Username</label>
                    </div>
                    <div class="input-group">
                        <input type="password" id="password" class="input-field" placeholder="" required>
                        <label for="password" class="floating-label">Enter password</label>
                        <div class="eye-icon" onclick="togglePassword()"> 
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-icon lucide-eye"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
                        </div>
                    </div>
                    <div class="input-group checkbox-group"> 
                        <div class="form-col remember-me">
                            <input type="checkbox" id="remember-me-checkbox" class="checkbox-field">
                            <label>Remember me</label>
                        </div>
                        <div class="form-col">
                            <a href="#" class="form-link">Forgot password?</a>
                        </div>    
                    </div>
                    <div class="role-col">
                      <input type="radio" id="admin" value="admin">
                      <label for="admin">Admin</label>
                      
                      <input type="radio" id="cashier">
                      <label for="cashier">Cashier</label>
                    </div>
                    <button type="submit" class="form-btn form-btn--submit">Login</button>
                </form>
                <div>
                    <p>Don't have an account? <a href="register.html" class="form-link">Create</a></p>
                </div>
            </div>
            <div class="left">
                <h2>Welcome to POS</h2>
                <div class="line"></div>
                <p>POS System is a sales management application that helps businesses process transactions, manage products, track inventory, and generate sales records efficiently.</p>
                <button class="know-btn">Know more</button>
            </div>
            <div class="circle1"></div>
            <div class="circle2"></div>
        </div>
        <script src="main.js"></script>
    </body>
</html>
