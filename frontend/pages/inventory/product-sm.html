<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Admin | Product Management with Navbar Toggle</title>
  <!-- Google Fonts: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f0f2f6;
      color: #1e293b;
    }

    /* === LAYOUT: SIDEBAR + MAIN === */
    .app-wrapper {
      display: flex;
      min-height: 100vh;
      transition: all 0.2s;
    }

    /* ---------- SIDEBAR (with toggle support) ---------- */
    .sidebar {
      width: 260px;
      background: linear-gradient(145deg, #0f172a 0%, #0a0f1f 100%);
      backdrop-filter: blur(2px);
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      box-shadow: 4px 0 24px rgba(0,0,0,0.08);
      transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1), visibility 0.2s;
      position: relative;
      overflow-x: hidden;
      flex-shrink: 0;
    }

    /* Hidden state for sidebar */
    .sidebar.hidden-nav {
      width: 0px;
      padding: 0;
      visibility: hidden;
      opacity: 0;
      min-width: 0;
      overflow: hidden;
    }

    /* inner content fade when hidden (optional smoothness) */
    .sidebar.hidden-nav .sidebar-inner {
      display: none;
    }

    .sidebar-inner {
      width: 260px;
      transition: opacity 0.2s;
    }

    .logo-area {
      padding: 28px 24px 20px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 28px;
    }

    .logo-area h2 {
      font-weight: 700;
      font-size: 1.5rem;
      background: linear-gradient(135deg, #fff, #94a3b8);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    .logo-area p {
      font-size: 0.7rem;
      color: #7e8b9e;
      margin-top: 6px;
      letter-spacing: 0.3px;
    }

    .nav-links {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 0 16px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      border-radius: 14px;
      font-weight: 500;
      font-size: 0.95rem;
      transition: all 0.2s;
      color: #cbd5e1;
      cursor: pointer;
    }

    .nav-item i {
      width: 22px;
      font-size: 1.2rem;
      text-align: center;
    }

    .nav-item.active {
      background: rgba(59,130,246,0.2);
      color: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      border-left: 3px solid #3b82f6;
    }

    .nav-item:not(.active):hover {
      background: rgba(255,255,255,0.06);
      color: #f1f5f9;
    }

    /* main content area */
    .main-content {
      flex: 1;
      overflow-x: auto;
      padding: 28px 32px 40px 32px;
      background: #f8fafc;
      transition: margin-left 0.2s;
    }

    /* top bar with toggle button and header */
    .top-bar {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .toggle-nav-btn {
      background: white;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 16px;
      font-size: 1.3rem;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
      color: #1e293b;
      background: #ffffff;
      border: 1px solid #e2e8f0;
    }

    .toggle-nav-btn:hover {
      background: #f1f5f9;
      transform: scale(0.96);
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 18px;
      flex: 1;
    }

    .page-header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(130deg, #0f172a, #1e293b);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }

    .add-item-btn {
      background: #3b82f6;
      border: none;
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.9rem;
      color: white;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 8px rgba(59,130,246,0.3);
    }

    .add-item-btn:hover {
      background: #2563eb;
      transform: translateY(-2px);
    }

    /* card table style */
    .card-table {
      background: white;
      border-radius: 28px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.05);
      overflow-x: auto;
      padding: 0 0 12px 0;
      margin-top: 10px;
    }

    .product-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      min-width: 1000px;
    }

    .product-table th {
      text-align: left;
      padding: 18px 16px;
      background-color: #f9fafb;
      font-weight: 600;
      color: #334155;
      border-bottom: 1px solid #e4e7eb;
    }

    .product-table td {
      padding: 16px;
      border-bottom: 1px solid #ecf3fa;
      vertical-align: middle;
      color: #1e293b;
      font-weight: 500;
    }

    .product-table tr:hover td {
      background-color: #fefce8;
    }

    .product-img-placeholder {
      width: 40px;
      height: 40px;
      background: #eef2ff;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #3b82f6;
      font-size: 1.2rem;
    }

    .action-icons i {
      font-size: 1.2rem;
      margin: 0 6px;
      cursor: pointer;
      transition: 0.1s;
    }

    .action-icons .fa-edit { color: #3b82f6; }
    .action-icons .fa-trash-alt { color: #ef4444; }
    .action-icons i:hover { opacity: 0.7; transform: scale(1.05); }

    .status-badge {
      background: #dcfce7;
      color: #15803d;
      padding: 6px 12px;
      border-radius: 100px;
      font-weight: 600;
      font-size: 0.7rem;
      display: inline-block;
    }

    /* MODAL STYLES */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-content {
      background: white;
      width: 90%;
      max-width: 680px;
      border-radius: 36px;
      box-shadow: 0 30px 50px rgba(0,0,0,0.3);
      animation: fadeInUp 0.2s ease;
      overflow: hidden;
    }

    @keyframes fadeInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0px); opacity: 1; }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 28px;
      background: #f9fafb;
      border-bottom: 1px solid #eef2ff;
    }

    .modal-header h3 { font-weight: 700; font-size: 1.4rem; }
    .close-modal { font-size: 28px; cursor: pointer; background: none; border: none; }

    .modal-body {
      padding: 28px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px 24px;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-field.full-width { grid-column: span 2; }
    .form-field label { font-weight: 600; font-size: 0.8rem; color: #475569; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-field input, .form-field select {
      padding: 12px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 16px;
      font-family: 'Inter', sans-serif;
    }
    .form-field input:focus, .form-field select:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }

    .modal-footer {
      padding: 18px 28px;
      background: #f9fafb;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      border-top: 1px solid #ecf3fa;
    }

    .btn-secondary, .btn-primary {
      padding: 10px 22px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      border: none;
    }
    .btn-secondary { background: #f1f5f9; color: #334155; }
    .btn-primary { background: #3b82f6; color: white; }

    @media (max-width: 800px) {
      .sidebar:not(.hidden-nav) { width: 220px; }
      .main-content { padding: 20px; }
      .modal-body { grid-template-columns: 1fr; }
      .form-field.full-width { grid-column: span 1; }
    }

    .empty-row td { text-align: center; padding: 48px; color: #64748b; }
    .brand-chip { background: #eef2ff; padding: 4px 10px; border-radius: 40px; font-size: 0.75rem; display: inline-block; }

    /* Tooltip / floating hint */
    .toggle-hint {
      position: absolute;
      background: #1e293b;
      color: white;
      font-size: 0.7rem;
      padding: 4px 8px;
      border-radius: 20px;
      pointer-events: none;
      white-space: nowrap;
      opacity: 0;
      transition: 0.1s;
    }
  </style>
</head>
<body>
<div class="app-wrapper">
  <!-- Sidebar with toggle support: uses hidden-nav class -->
  <aside class="sidebar" id="sidebarNav">
    <div class="sidebar-inner">
      <div class="logo-area">
        <h2><i class="fas fa-boxes"></i> StockFlow</h2>
        <p>Admin panel v2.0</p>
      </div>
      <div class="nav-links">
        <div class="nav-item active"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></div>
        <div class="nav-item "><i class="fas fa-tags"></i><span>Products</span></div>
        <div class="nav-item"><i class="fas fa-cash-register"></i><span>Cashier</span></div>
        <div class="nav-item"><i class="fas fa-warehouse"></i><span>Inventory</span></div>
        <div class="nav-item"><i class="fas fa-sliders-h"></i><span>Setting</span></div>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <div class="top-bar">
      <button class="toggle-nav-btn" id="toggleNavbarBtn" title="Hide/Unhide Navigation Bar">
        <i class="fas fa-bars"></i>
      </button>
      <div class="page-header">
        <h1><i class="fas fa-cube"></i> Product Management</h1>
        <button class="add-item-btn" id="openAddModalBtn"><i class="fas fa-plus-circle"></i> Add New Item</button>
      </div>
    </div>

    <!-- Product Table: dynamic columns based on SVG fields -->
    <div class="card-table">
      <table class="product-table" id="productTable">
        <thead>
          <tr>
            <th>PRODUCT ID</th><th>IMAGE</th><th>NAME</th><th>CATEGORY</th><th>UNIT</th><th>BRAND</th><th>COST PRICE</th><th>SELLING PRICE</th><th>BARCODE</th><th>STATUS</th><th>ACTIONS</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </main>
</div>

<!-- Modal for Add / Edit Product -->
<div id="productModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalTitle">Add New Item</h3>
      <button class="close-modal" id="closeModalBtn">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-field"><label>Product Name *</label><input type="text" id="productName" placeholder="e.g. Organic Coffee"></div>
      <div class="form-field"><label>Category *</label><input type="text" id="category" placeholder="Beverages / Electronics"></div>
      <div class="form-field"><label>Unit</label><input type="text" id="unit" placeholder="pcs, kg, liter"></div>
      <div class="form-field"><label>Brand</label><input type="text" id="brand" placeholder="Brand name"></div>
      <div class="form-field"><label>Cost Price ($)</label><input type="number" step="0.01" id="costPrice" placeholder="0.00"></div>
      <div class="form-field"><label>Selling Price ($)</label><input type="number" step="0.01" id="sellingPrice" placeholder="0.00"></div>
      <div class="form-field"><label>Barcode</label><input type="text" id="barcode" placeholder="1234567890"></div>
      <div class="form-field"><label>Status</label><select id="status"><option value="Active">Active</option><option value="Inactive">Inactive</option></select></div>
      <div class="form-field full-width" style="font-size:12px; color:#6c757d;"><i class="fas fa-info-circle"></i> Product image uses placeholder icon</div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" id="cancelModalBtn">Cancel</button>
      <button class="btn-primary" id="saveProductBtn">Save Product</button>
    </div>
  </div>
</div>

<script>
  // ---------- DATA ----------
  let products = [];
  let editingId = null;

  function generateProductId() {
    return 'PRD-' + Math.floor(Date.now() % 1000000) + '-' + Math.floor(Math.random() * 999);
  }

  const initialProducts = [
    { id: generateProductId(), name: "Premium Espresso Beans", category: "Beverages", unit: "500g", brand: "RoastMaster", costPrice: 8.50, sellingPrice: 14.99, barcode: "490123456789", status: "Active", imageIcon: "fa-mug-hot" },
    { id: generateProductId(), name: "Wireless Noise Cancelling Headphones", category: "Electronics", unit: "pcs", brand: "SoundWave", costPrice: 45.00, sellingPrice: 89.99, barcode: "880123456789", status: "Active", imageIcon: "fa-headphones" },
    { id: generateProductId(), name: "Men's Running Shoes", category: "Apparel", unit: "pair", brand: "Athletix", costPrice: 32.00, sellingPrice: 69.99, barcode: "570123456789", status: "Inactive", imageIcon: "fa-shoe-prints" }
  ];

  function initData() {
    products = initialProducts.map(p => ({ ...p, id: p.id || generateProductId() }));
    renderTable();
  }

  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  function renderTable() {
    const tbody = document.getElementById('tableBody');
    if (!products.length) {
      tbody.innerHTML = `<tr class="empty-row"><td colspan="11">No products found. Click "Add New Item" to create product.</td></tr>`;
      return;
    }
    tbody.innerHTML = products.map(product => `
      <tr>
        <td><span class="brand-chip" style="background:#eef2ff;">${escapeHtml(product.id)}</span></td>
        <td><div class="product-img-placeholder"><i class="fas ${product.imageIcon || 'fa-image'}"></i></div></td>
        <td><strong>${escapeHtml(product.name)}</strong></td>
        <td>${escapeHtml(product.category)}</td>
        <td>${escapeHtml(product.unit || '-')}</td>
        <td>${escapeHtml(product.brand || '-')}</td>
        <td>$${parseFloat(product.costPrice || 0).toFixed(2)}</td>
        <td>$${parseFloat(product.sellingPrice || 0).toFixed(2)}</td>
        <td><span style="font-family: monospace;">${escapeHtml(product.barcode || '-')}</span></td>
        <td><span class="status-badge" style="${product.status === 'Inactive' ? 'background:#fee2e2; color:#b91c1c;' : ''}">${product.status}</span></td>
        <td class="action-icons">
          <i class="fas fa-edit" data-id="${product.id}" title="Edit"></i>
          <i class="fas fa-trash-alt" data-id="${product.id}" title="Delete"></i>
        </td>
      </tr>
    `).join('');
    document.querySelectorAll('.fa-edit').forEach(icon => {
      icon.addEventListener('click', (e) => { const id = icon.getAttribute('data-id'); openEditModal(id); });
    });
    document.querySelectorAll('.fa-trash-alt').forEach(icon => {
      icon.addEventListener('click', (e) => { const id = icon.getAttribute('data-id'); deleteProductById(id); });
    });
  }

  function deleteProductById(id) {
    if(confirm('Delete this product?')){ products = products.filter(p => p.id !== id); renderTable(); }
  }

  function openAddModal() {
    editingId = null;
    document.getElementById('modalTitle').innerText = 'Add New Item';
    document.getElementById('productName').value = '';
    document.getElementById('category').value = '';
    document.getElementById('unit').value = '';
    document.getElementById('brand').value = '';
    document.getElementById('costPrice').value = '';
    document.getElementById('sellingPrice').value = '';
    document.getElementById('barcode').value = '';
    document.getElementById('status').value = 'Active';
    document.getElementById('productModal').style.display = 'flex';
  }

  function openEditModal(id) {
    const product = products.find(p => p.id === id);
    if(!product) return;
    editingId = id;
    document.getElementById('modalTitle').innerText = 'Edit Product';
    document.getElementById('productName').value = product.name || '';
    document.getElementById('category').value = product.category || '';
    document.getElementById('unit').value = product.unit || '';
    document.getElementById('brand').value = product.brand || '';
    document.getElementById('costPrice').value = product.costPrice ?? '';
    document.getElementById('sellingPrice').value = product.sellingPrice ?? '';
    document.getElementById('barcode').value = product.barcode || '';
    document.getElementById('status').value = product.status || 'Active';
    document.getElementById('productModal').style.display = 'flex';
  }

  function saveProductFromModal() {
    const name = document.getElementById('productName').value.trim();
    const category = document.getElementById('category').value.trim();
    const unit = document.getElementById('unit').value.trim();
    const brand = document.getElementById('brand').value.trim();
    let costPrice = parseFloat(document.getElementById('costPrice').value);
    let sellingPrice = parseFloat(document.getElementById('sellingPrice').value);
    const barcode = document.getElementById('barcode').value.trim();
    const status = document.getElementById('status').value;
    if(!name || !category) { alert('Product Name and Category are required!'); return; }
    if(isNaN(costPrice)) costPrice = 0;
    if(isNaN(sellingPrice)) sellingPrice = 0;
    const imageIconsList = ['fa-box', 'fa-cube', 'fa-archive', 'fa-tag', 'fa-apple', 'fa-mobile-alt', 'fa-laptop', 'fa-tshirt'];
    const randomIcon = imageIconsList[Math.floor(Math.random() * imageIconsList.length)];
    if(editingId === null) {
      const newProduct = { id: generateProductId(), name, category, unit: unit || 'pcs', brand: brand || 'Generic', costPrice, sellingPrice, barcode: barcode || 'N/A', status, imageIcon: randomIcon };
      products.unshift(newProduct);
    } else {
      const index = products.findIndex(p => p.id === editingId);
      if(index !== -1) {
        products[index] = { ...products[index], name, category, unit: unit || products[index].unit, brand: brand || products[index].brand, costPrice, sellingPrice, barcode: barcode || products[index].barcode, status };
      }
    }
    renderTable();
    closeModal();
  }

  function closeModal() { document.getElementById('productModal').style.display = 'none'; editingId = null; }

  // ----- SIDEBAR TOGGLE (HIDE / UNHIDE) -----
  const sidebar = document.getElementById('sidebarNav');
  const toggleBtn = document.getElementById('toggleNavbarBtn');
  
  // Load preference from localStorage (optional persistence)
  let isNavHidden = false; // default visible
  function setNavbarState(hide) {
    if (hide) {
      sidebar.classList.add('hidden-nav');
      isNavHidden = true;
      localStorage.setItem('navbarHidden', 'true');
      toggleBtn.innerHTML = '<i class="fas fa-chevron-right"></i>';  // indicate hidden -> show hint
      toggleBtn.title = "Unhide Navigation Bar";
    } else {
      sidebar.classList.remove('hidden-nav');
      isNavHidden = false;
      localStorage.setItem('navbarHidden', 'false');
      toggleBtn.innerHTML = '<i class="fas fa-bars"></i>';
      toggleBtn.title = "Hide Navigation Bar";
    }
  }

  function toggleNavbar() {
    setNavbarState(!isNavHidden);
  }

  // Check localStorage for saved preference
  const savedState = localStorage.getItem('navbarHidden');
  if (savedState === 'true') {
    setNavbarState(true);
  } else if (savedState === 'false') {
    setNavbarState(false);
  } else {
    setNavbarState(false); // default visible
  }
  toggleBtn.addEventListener('click', toggleNavbar);

  // modal event listeners
  document.getElementById('openAddModalBtn').addEventListener('click', openAddModal);
  document.getElementById('closeModalBtn').addEventListener('click', closeModal);
  document.getElementById('cancelModalBtn').addEventListener('click', closeModal);
  document.getElementById('saveProductBtn').addEventListener('click', saveProductFromModal);
  window.addEventListener('click', (e) => { const modal = document.getElementById('productModal'); if(e.target === modal) closeModal(); });

  // Sidebar navigation highlight, plus demo message (non-destructive)
  const navItems = document.querySelectorAll('.nav-item');
  navItems.forEach(item => {
    item.addEventListener('click', function() {
      navItems.forEach(nav => nav.classList.remove('active'));
      this.classList.add('active');
      if(this.innerText.includes('Products')) alert('You are already on Product Management view.');
      else alert(`Demo: ${this.innerText} section (Product Management remains active).`);
    });
  });

  initData();
</script>
</body>
</html>
